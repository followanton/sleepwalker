<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="540" fill="#000000"/>
  <rect x="0.5" y="0.5" width="999" height="539" fill="none" stroke="#222222"/>

  <text x="40" y="48" fill="#a78bfa" font-size="13" letter-spacing="3">// CONTENT INTELLIGENCE</text>
  <text x="40" y="80" fill="#f5f3ef" font-size="22" font-weight="700">Content score</text>
  <text x="40" y="102" fill="#8a8a8a" font-size="13.5">how well a page answers live AI-search demand</text>

  <!-- score ring -->
  <g transform="translate(230,300)">
    <circle r="92" fill="none" stroke="#1a1a1a" stroke-width="18"/>
    <circle r="92" fill="none" stroke="url(#ring)" stroke-width="18" stroke-linecap="round"
            stroke-dasharray="468 578" transform="rotate(-90)"/>
    <text x="0" y="2" text-anchor="middle" fill="#f5f3ef" font-size="62" font-weight="700">81</text>
    <text x="0" y="34" text-anchor="middle" fill="#3b82f6" font-size="17" font-weight="600">Good</text>
    <text x="0" y="120" text-anchor="middle" fill="#6a6a6a" font-size="12.5">out of 100</text>
  </g>

  <!-- sub-metrics -->
  <g font-size="14">
    <text x="470" y="170" fill="#a0a0a0">Depth</text>
    <rect x="600" y="158" width="300" height="14" rx="7" fill="#141414"/>
    <rect x="600" y="158" width="252" height="14" rx="7" fill="#3b82f6"/>
    <text x="912" y="170" fill="#f5f3ef" font-size="13">84</text>

    <text x="470" y="230" fill="#a0a0a0">Freshness</text>
    <rect x="600" y="218" width="300" height="14" rx="7" fill="#141414"/>
    <rect x="600" y="218" width="216" height="14" rx="7" fill="#a78bfa"/>
    <text x="912" y="230" fill="#f5f3ef" font-size="13">72</text>

    <text x="470" y="290" fill="#a0a0a0">Coverage</text>
    <rect x="600" y="278" width="300" height="14" rx="7" fill="#141414"/>
    <rect x="600" y="278" width="237" height="14" rx="7" fill="#3b82f6"/>
    <text x="912" y="290" fill="#f5f3ef" font-size="13">79</text>

    <text x="470" y="350" fill="#a0a0a0">Structure</text>
    <rect x="600" y="338" width="300" height="14" rx="7" fill="#141414"/>
    <rect x="600" y="338" width="264" height="14" rx="7" fill="#a78bfa"/>
    <text x="912" y="350" fill="#f5f3ef" font-size="13">88</text>
  </g>

  <line x1="40" y1="404" x2="960" y2="404" stroke="#1c1c1c"/>

  <!-- top fixes -->
  <text x="40" y="442" fill="#a78bfa" font-size="15" font-weight="600">Top fixes</text>
  <g font-size="14.5" fill="#c9c9c9">
    <text x="40" y="472"><tspan fill="#a78bfa">›</tspan>  Add a comparison section against the alternatives buyers name</text>
    <text x="40" y="498"><tspan fill="#a78bfa">›</tspan>  Answer pricing questions directly on the page, not just in a link</text>
    <text x="40" y="524"><tspan fill="#a78bfa">›</tspan>  Add FAQ structure for the buyer-intent queries you are missing</text>
  </g>
</svg>
