<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#4a4a4a"/>
    </marker>
    <pattern id="g2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1000" height="760" fill="#000000"/>
  <rect width="1000" height="760" fill="url(#g2)"/>
  <rect x="0.5" y="0.5" width="999" height="759" fill="none" stroke="#222222"/>

  <text x="40" y="48" fill="#8a8a8a" font-size="14" letter-spacing="3">SLEEPWALKER ACTION FLOW</text>

  <!-- surfaces -->
  <g font-size="18" font-weight="600" text-anchor="middle">
    <g>
      <rect x="60" y="78" width="180" height="58" rx="10" fill="#0c0c0c" stroke="#2a2a2a"/>
      <text x="150" y="113" fill="#f5f3ef">App</text>
    </g>
    <g>
      <rect x="280" y="78" width="180" height="58" rx="10" fill="#0c0c0c" stroke="#2a2a2a"/>
      <text x="370" y="113" fill="#f5f3ef">API</text>
    </g>
    <g>
      <rect x="500" y="78" width="180" height="58" rx="10" fill="#0c0c0c" stroke="#2a2a2a"/>
      <text x="590" y="113" fill="#f5f3ef">MCP</text>
    </g>
    <g>
      <rect x="720" y="78" width="180" height="58" rx="10" fill="#0c0c0c" stroke="#2a2a2a"/>
      <text x="810" y="113" fill="#f5f3ef">CLI</text>
    </g>
  </g>
  <text x="500" y="160" text-anchor="middle" fill="#8a8a8a" font-size="14">humans, code, and agents</text>

  <!-- converge to action layer -->
  <path d="M150 136 V184 H500 V206" fill="none" stroke="#4a4a4a" stroke-width="1.3"/>
  <path d="M370 136 V184" fill="none" stroke="#4a4a4a" stroke-width="1.3"/>
  <path d="M590 136 V184" fill="none" stroke="#4a4a4a" stroke-width="1.3"/>
  <path d="M810 136 V184 H500" fill="none" stroke="#4a4a4a" stroke-width="1.3"/>
  <path d="M500 184 V206" fill="none" stroke="#22c55e" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- action layer bar -->
  <rect x="180" y="210" width="640" height="66" rx="12" fill="#0a140d" stroke="#22c55e" stroke-opacity="0.55"/>
  <text x="500" y="244" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="700">Sleepwalker actions</text>
  <text x="500" y="266" text-anchor="middle" fill="#8a8a8a" font-size="13">one request path for every surface</text>

  <path d="M500 276 V304" fill="none" stroke="#4a4a4a" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- controls row -->
  <g font-size="14" text-anchor="middle" fill="#a0a0a0">
    <g><rect x="120" y="308" width="120" height="40" rx="20" fill="#0c0c0c" stroke="#2a2a2a"/><text x="180" y="333">credits</text></g>
    <g><rect x="252" y="308" width="120" height="40" rx="20" fill="#0c0c0c" stroke="#2a2a2a"/><text x="312" y="333">prompts</text></g>
    <g><rect x="384" y="308" width="132" height="40" rx="20" fill="#0c0c0c" stroke="#2a2a2a"/><text x="450" y="333">pages</text></g>
    <g><rect x="528" y="308" width="132" height="40" rx="20" fill="#0c0c0c" stroke="#2a2a2a"/><text x="594" y="333">queue</text></g>
    <g><rect x="672" y="308" width="120" height="40" rx="20" fill="#0c0c0c" stroke="#2a2a2a"/><text x="732" y="333">results</text></g>
    <g><rect x="804" y="308" width="76" height="40" rx="20" fill="#0c0c0c" stroke="#2a2a2a"/><text x="842" y="333">logs</text></g>
  </g>

  <path d="M500 348 V392" fill="none" stroke="#4a4a4a" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- engine capabilities -->
  <g font-size="17" font-weight="600" text-anchor="middle">
    <g>
      <rect x="80" y="396" width="250" height="86" rx="12" fill="#0a140d" stroke="#22c55e" stroke-opacity="0.4"/>
      <text x="205" y="432" fill="#22c55e">AI Visibility</text>
      <text x="205" y="458" fill="#8a8a8a" font-size="12.5" font-weight="400">probe answers, track mentions</text>
    </g>
    <g>
      <rect x="375" y="396" width="250" height="86" rx="12" fill="#120f1c" stroke="#a78bfa" stroke-opacity="0.4"/>
      <text x="500" y="432" fill="#a78bfa">Content Intelligence</text>
      <text x="500" y="458" fill="#8a8a8a" font-size="12.5" font-weight="400">score gaps, get fixes</text>
    </g>
    <g>
      <rect x="670" y="396" width="250" height="86" rx="12" fill="#0b1018" stroke="#60a5fa" stroke-opacity="0.4"/>
      <text x="795" y="432" fill="#60a5fa">Serialization</text>
      <text x="795" y="458" fill="#8a8a8a" font-size="12.5" font-weight="400">clean content for agents</text>
    </g>
  </g>

  <path d="M500 482 V524" fill="none" stroke="#4a4a4a" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- results -->
  <rect x="250" y="528" width="500" height="64" rx="12" fill="#0c0c0c" stroke="#2a2a2a"/>
  <text x="500" y="560" text-anchor="middle" fill="#f5f3ef" font-size="18" font-weight="600">Results, credits, and activity</text>
  <text x="500" y="581" text-anchor="middle" fill="#8a8a8a" font-size="13">saved once, readable from every surface</text>

  <!-- read-back loop -->
  <path d="M250 560 H110 V107 H60" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="92" y="340" fill="#6a6a6a" font-size="12" transform="rotate(-90 92 340)">read back anywhere</text>

  <text x="500" y="648" text-anchor="middle" fill="#8a8a8a" font-size="14">Same engine. Every surface. One result record.</text>
  <rect x="380" y="676" width="240" height="3" rx="1.5" fill="url(#spine)"/>
</svg>
