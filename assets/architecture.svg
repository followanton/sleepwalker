<svg viewBox="0 0 560 430" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-labelledby="title desc">
  <title id="title">Sleepwalker workflow diagram</title>
  <desc id="desc">AI Visibility and Content Intelligence flow through Sleepwalker into MCP, API, CLI, and Console access.</desc>
  <defs>
    <linearGradient id="hero-flow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="hero-core-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="52%" stop-color="#60a5fa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="hero-soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.77 0 0 0 0 0.37 0 0 0 0.4 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .grid path{fill:none;stroke:rgba(255,255,255,.055);stroke-width:1}.node rect{fill:rgba(245,243,239,.045);stroke:rgba(245,243,239,.16);stroke-width:1}.node text{fill:#f5f3ef;font-size:12px;font-weight:600;letter-spacing:.02em}.node .sub{fill:#8a8a8a;font-size:10px;font-weight:500}.output rect{stroke:rgba(167,139,250,.3)}.input rect{stroke:rgba(34,197,94,.24)}.flow{fill:none;stroke:url(#hero-flow-gradient);stroke-width:1.6;stroke-linecap:round;stroke-dasharray:10 14}.core-ring{fill:none;transform-origin:30px 45px}.outer{stroke:rgba(34,197,94,.22);stroke-width:1.2}.inner{stroke:rgba(167,139,250,.35);stroke-width:1.2}.core-dot{fill:url(#hero-core-gradient);opacity:.92}.logo-backdrop{fill:rgba(5,5,5,.72)}.caption text{fill:#6f6f6f;font-size:10px;letter-spacing:.14em;text-transform:uppercase}
    </style>
  </defs>

  <rect width="560" height="430" fill="#000000"/>
  <g class="grid" aria-hidden="true">
    <path d="M40 80H520"/><path d="M40 160H520"/><path d="M40 240H520"/><path d="M40 320H520"/>
    <path d="M120 40V390"/><path d="M220 40V390"/><path d="M340 40V390"/><path d="M440 40V390"/>
  </g>

  <g aria-hidden="true">
    <path class="flow" d="M174 139 C212 139 225 188 249 203"/>
    <path class="flow" d="M174 264 C214 264 226 234 249 223"/>
    <path class="flow" d="M311 199 C354 178 365 91 424 91"/>
    <path class="flow" d="M311 209 C358 198 368 169 424 169"/>
    <path class="flow" d="M311 222 C358 233 368 247 424 247"/>
    <path class="flow" d="M311 232 C354 257 365 325 424 325"/>
  </g>

  <g class="node input" transform="translate(42 104)">
    <rect width="132" height="70" rx="16"/>
    <text x="16" y="39">AI Visibility</text>
  </g>

  <g class="node input" transform="translate(42 229)">
    <rect width="132" height="70" rx="16"/>
    <text x="16" y="28">Content</text>
    <text x="16" y="46">Intelligence</text>
  </g>

  <g transform="translate(250 170)">
