    <circle class="core-ring inner" cx="30" cy="45" r="45"/>
    <circle class="core-dot" cx="30" cy="45" r="27" filter="url(#hero-soft-glow)"/>
    <circle class="logo-backdrop" cx="30" cy="45" r="21"/>
    <g transform="translate(9 24) scale(0.021)">
      <path d="M517.814 1214.776c-2.183-266.126 212.105-483.959 478.231-486.141 266.126-2.183 483.959 212.105 486.141 478.231 2.183 266.126-212.105 483.959-478.231 486.141-266.126 2.183-483.959-212.105-486.141-478.231Z" fill="#22c55f"/>
      <path d="M751.697 1212.858c-1.124-137.042 109.224-249.216 246.267-250.34 137.042-1.124 249.216 109.224 250.34 246.267 1.124 137.042-109.224 249.216-246.267 250.34-137.042 1.124-249.216-109.224-250.34-246.267Z" fill="#000000"/>
      <path d="M247.773 1331.179c-34.064-86.329-51.096-185.927-51.096-298.794 0-132.544 33.136-253.445 99.408-362.704 66.272-109.259 159.411-197.025 279.417-263.296 120.006-66.272 260.61-99.408 421.812-99.408h37.614c157.62 0 293.746 33.136 408.378 99.408 114.632 66.272 203.294 154.037 265.983 263.296 62.69 109.259 94.034 230.161 94.034 362.704 0 112.867-17.032 212.465-51.096 298.794.032-2.873.049-5.75.049-8.63 0-415.192-337.083-752.276-752.276-752.276-415.192 0-752.276 337.083-752.276 752.276 0 2.88.016 5.757.049 8.63Z" fill="#a588f5"/>
    </g>
  </g>

  <g class="node output" transform="translate(424 62)">
    <rect width="96" height="58" rx="14"/>
    <text x="16" y="25">MCP</text><text x="16" y="43" class="sub">agents</text>
  </g>
  <g class="node output" transform="translate(424 140)">
    <rect width="96" height="58" rx="14"/>
    <text x="16" y="25">API</text><text x="16" y="43" class="sub">products</text>
  </g>
  <g class="node output" transform="translate(424 218)">
    <rect width="96" height="58" rx="14"/>
    <text x="16" y="25">CLI</text><text x="16" y="43" class="sub">scripts</text>
  </g>
  <g class="node output" transform="translate(424 296)">
    <rect width="96" height="58" rx="14"/>
    <text x="16" y="25">Console</text><text x="16" y="43" class="sub">human</text>
  </g>

  <g class="caption">
    <text x="42" y="394" text-anchor="start">intelligence</text>
    <text x="280" y="394" text-anchor="middle">sleepwalker</text>
    <text x="520" y="394" text-anchor="end">workflows</text>
  </g>
</svg>
