<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="500" fill="#000000"/>
  <rect x="0.5" y="0.5" width="999" height="499" fill="none" stroke="#222222"/>

  <text x="40" y="50" fill="#f5f3ef" font-size="22" font-weight="700">Mention rate</text>
  <text x="40" y="74" fill="#8a8a8a" font-size="13.5">share of AI answers mentioning your brand, last 8 weeks</text>
  <text x="960" y="46" text-anchor="end" fill="#22c55e" font-size="34" font-weight="700">+31 pts</text>
  <text x="960" y="70" text-anchor="end" fill="#8a8a8a" font-size="12.5">since week 1</text>

  <!-- y gridlines + labels -->
  <g stroke="#161616">
    <line x1="120" y1="110" x2="940" y2="110"/>
    <line x1="120" y1="185" x2="940" y2="185"/>
    <line x1="120" y1="260" x2="940" y2="260"/>
    <line x1="120" y1="335" x2="940" y2="335"/>
    <line x1="120" y1="410" x2="940" y2="410"/>
  </g>
  <g fill="#6a6a6a" font-size="11.5" text-anchor="end">
    <text x="104" y="114">100</text>
    <text x="104" y="189">75</text>
    <text x="104" y="264">50</text>
    <text x="104" y="339">25</text>
    <text x="104" y="414">0</text>
  </g>

  <!-- area + line: W1..W8 = 41,47,52,49,58,63,68,72 -->
  <path d="M120 287 L237 269 L354 254 L471 263 L589 236 L706 221 L823 206 L940 194 L940 410 L120 410 Z" fill="url(#area)"/>
  <polyline points="120,287 237,269 354,254 471,263 589,236 706,221 823,206 940,194"
            fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- markers -->
  <g fill="#000000" stroke="#22c55e" stroke-width="2.5">
    <circle cx="120" cy="287" r="4"/>
    <circle cx="237" cy="269" r="4"/>
    <circle cx="354" cy="254" r="4"/>
    <circle cx="471" cy="263" r="4"/>
    <circle cx="589" cy="236" r="4"/>
    <circle cx="706" cy="221" r="4"/>
    <circle cx="823" cy="206" r="4"/>
  </g>
  <circle cx="940" cy="194" r="6" fill="#22c55e"/>
  <text x="940" y="176" text-anchor="end" fill="#22c55e" font-size="13" font-weight="700">72%</text>

  <!-- x labels -->
  <g fill="#6a6a6a" font-size="11.5" text-anchor="middle">
    <text x="120" y="436">W1</text>
    <text x="237" y="436">W2</text>
    <text x="354" y="436">W3</text>
    <text x="471" y="436">W4</text>
    <text x="589" y="436">W5</text>
    <text x="706" y="436">W6</text>
    <text x="823" y="436">W7</text>
    <text x="940" y="436">W8</text>
  </g>

  <text x="40" y="478" fill="#6a6a6a" font-size="12.5">illustrative sample · run on a schedule to build your own series</text>
</svg>
